name: Build and Release PDF

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.x'  # Define .NET version
  PROJECT_NAME: 'Flixen.CurriculumVitae.Builder'  # Define project name
  PUBLISH_DIR: './publish'  # Directory for publishing output
  OUTPUT_PDF: './github-release/folder/resume.pdf'
  OUTPUT_PDF_ANONYMOUS: './github-release/folder/resume-anonymous.pdf'
  CONFIG_FILE: '../profile.yaml' # resume data file (repo root)
  THEME_FILE: './theme.yaml' # theme file (colors, fonts, image)
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup .NET Core with the specified version
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Restore dependencies with Release configuration
      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: >-
          dotnet build
          --no-restore
          --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Generate PDF
        working-directory: ./${{ env.PROJECT_NAME }}
        run: >-
          dotnet run
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --config-file ${{ env.CONFIG_FILE }}
          --theme-file ${{ env.THEME_FILE }}
          -- write
          --output ../github-release/folder/resume.pdf

      - name: Generate anonymous PDF
        working-directory: ./${{ env.PROJECT_NAME }}
        run: >-
          dotnet run
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --config-file ${{ env.CONFIG_FILE }}
          --theme-file ${{ env.THEME_FILE }}
          --anonymous
          -- write
          --output ../github-release/folder/resume-anonymous.pdf

      # Upload the generated PDF to the GitHub release
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.OUTPUT_PDF }}
            ${{ env.OUTPUT_PDF_ANONYMOUS }}
          token: ${{ secrets.GITHUB_TOKEN }}
